<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark glassmorphism rounded squircle card -->
  <rect x="40" y="40" width="432" height="432" rx="110" fill="#0b0f19" stroke="url(#glowGrad)" stroke-width="12" filter="url(#softGlow)" />
  
  <!-- Accent overlay for depth -->
  <rect x="46" y="46" width="420" height="420" rx="104" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.1" />

  <!-- Code symbol & Monogram "S" combined inside -->
  <g transform="translate(106, 106)">
    <!-- Left bracket < -->
    <path d="M 50 60 L 10 150 L 50 240" fill="none" stroke="url(#accentGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Stylized Central S (Glowing Neon/Purple-Pink) -->
    <path d="M 200 90 C 200 40, 100 50, 100 110 C 100 170, 200 130, 200 190 C 200 250, 100 260, 100 210" 
          fill="none" stroke="url(#glowGrad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Right bracket > -->
    <path d="M 250 60 L 290 150 L 250 240" fill="none" stroke="url(#accentGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>